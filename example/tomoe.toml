# Example tomoe config.
# Paths are resolved relative to this config file.

workdir = "../work-example"
iterations = 3

tool_command = "../../test_kuroko.sh"
llm_command = "codex exec"
# eval_llm_command = "llm -m evaluator-model"
# modify_llm_command = "codex exec"
target = "../../isohyps/isohyps/project_analysis.py"

eval_template = "./eval_template.md"
modify_template = "./modify_template.md"
# persistence_template = "./persistence_template.md"
# redteam_template = "./redteam_template.md"
# synthesis_template = "./synthesis_template.md"
# review_llm_command = "codex exec"
# auto_review = true

keep_modify_output = true
result_artifacts = ["../../isohyps/analysis_docs"]
modify_mode = "direct-edit"
git_checkpoint = true
stream_tool_output = "stderr"

[[result.includes]]
path = "../../isohyps/analysis_docs/analysis_report.md"
label = "analysis report"
note = "Status, Source Coverage, Fallback docs generated, Weak or failed docs, Step History を評価する"

[[result.includes]]
path = "../../isohyps/analysis_docs/index.md"
label = "analysis index"
note = "索引として有用か、失敗状態だけになっていないかを評価する"
